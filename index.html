<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#4CAF50; color:white; padding:15px; text-align:center; }

nav { display:flex; justify-content:center; background:white; }
nav button { padding:10px; border:none; background:none; cursor:pointer; }

.page { display:none; padding:20px; max-width:600px; margin:auto; }
.active { display:block; }

.card { background:white; padding:15px; margin-bottom:10px; border-radius:8px; }

input { width:100%; padding:8px; margin-bottom:10px; }

button.primary { background:#4CAF50; color:white; }
button.danger { background:red; color:white; }

.status { text-align:center; padding:5px; font-size:12px; }
</style>
</head>

<body>

<header>
<h2>Kasir PWA Offline Online</h2>
</header>

<div id="status" class="status">Checking...</div>

<nav>
<button onclick="nav('kasir')">Kasir</button>
<button onclick="nav('riwayat')">Riwayat</button>
</nav>

<!-- KASIR -->
<section id="kasir" class="page active">
<div class="card">
<input id="nama" placeholder="Nama Barang">
<input id="harga" type="number" placeholder="Harga">
<input id="qty" type="number" placeholder="Qty">
<button class="primary" onclick="tambah()">Tambah</button>
</div>

<div class="card">
<h3>Total: Rp <span id="total">0</span></h3>
<button onclick="sync()">Sync Data</button>
</div>
</section>

<!-- RIWAYAT -->
<section id="riwayat" class="page">
<div id="list"></div>
</section>


<script>
    if(localStorage.getItem("login") !== "true"){
    window.location.href = "login.html";
}
const DB = 'kasir_db';

// NAVIGATION
function nav(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='riwayat') tampil();
}

// CREATE
function tambah(){
    let nama = document.getElementById('nama').value;
    let harga = parseInt(document.getElementById('harga').value);
    let qty = parseInt(document.getElementById('qty').value);

    if(!nama || !harga || !qty){
        alert('Isi semua!');
        return;
    }

    let total = harga * qty;

    let data = JSON.parse(localStorage.getItem(DB)) || [];
    data.unshift({ id: Date.now(), nama, harga, qty, total });

    localStorage.setItem(DB, JSON.stringify(data));

    document.getElementById('total').innerText = total;

    document.getElementById('nama').value='';
    document.getElementById('harga').value='';
    document.getElementById('qty').value='';

    alert('Berhasil disimpan!');
}

// READ
function tampil(){
    let data = JSON.parse(localStorage.getItem(DB)) || [];
    let list = document.getElementById('list');

    if(data.length===0){
        list.innerHTML = '<p>Tidak ada data</p>';
        return;
    }

    list.innerHTML = data.map((d,i)=>`
        <div class="card">
            <b>${d.nama}</b><br>
            Harga: ${d.harga}<br>
            Qty: ${d.qty}<br>
            Total: ${d.total}<br>
            <button class="danger" onclick="hapus(${i})">Hapus</button>
        </div>
    `).join('');
}

// DELETE
function hapus(i){
    let data = JSON.parse(localStorage.getItem(DB));
    data.splice(i,1);
    localStorage.setItem(DB, JSON.stringify(data));
    tampil();
}

// STATUS ONLINE/OFFLINE
function status(){
    let el = document.getElementById('status');

    if(navigator.onLine){
        el.innerText = "ONLINE";
        el.style.background = "green";
        el.style.color = "white";
    }else{
        el.innerText = "OFFLINE";
        el.style.background = "red";
        el.style.color = "white";
    }
}

window.addEventListener('online', ()=>{ status(); sync(); });
window.addEventListener('offline', status);
status();

// SYNC (2 ARAH)
async function sync(){
    if(!navigator.onLine){
        alert('Offline!');
        return;
    }

    let localData = JSON.parse(localStorage.getItem(DB)) || [];

    try{
        // GET server
        let res = await fetch('data.json');
        let serverData = await res.json();

        // MERGE
        let merged = [...localData];

        serverData.forEach(s=>{
            let exist = localData.some(l=>l.id === s.id);
            if(!exist) merged.push(s);
        });

        localStorage.setItem(DB, JSON.stringify(merged));

        // POST ke server (butuh PHP)
        await fetch('save.php',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(merged)
        });

        alert('Sync sukses!');
        tampil();

    }catch(e){
        alert('Sync gagal');
    }
}

// SERVICE WORKER
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
