<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kasir PWA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff4d4d;
    }

    .status {
      text-align: center;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
      font-weight: bold;
    }

    .online {
      background: #1f8b4c;
    }

    .offline {
      background: #b33939;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .menu, .cart {
      flex: 1;
      background: #1e1e1e;
      padding: 15px;
      border-radius: 15px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      background: #2a2a2a;
      padding: 10px;
      border-radius: 10px;
    }

    button {
      background: #ff4d4d;
      border: none;
      padding: 5px 10px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #ff1a1a;
    }

    .total {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>🧾 Kasir Sederhana</h1>

<div id="status" class="status">Checking...</div>

<div class="container">
  <!-- MENU -->
  <div class="menu">
    <h2>Menu</h2>
    <div id="menuList"></div>
  </div>

  <!-- KERANJANG -->
  <div class="cart">
    <h2>Keranjang</h2>
    <div id="cartList"></div>
    <div class="total">Total: Rp <span id="total">0</span></div>
  </div>
</div>

<script>
let cart = [];
let total = 0;

// Load data
fetch('data.json')
.then(res => res.json())
.then(data => {
  const menuList = document.getElementById('menuList');

  data.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <span>${item.nama} - Rp ${item.harga}</span>
      <button onclick="addToCart('${item.nama}', ${item.harga})">+</button>
    `;
    menuList.appendChild(div);
  });
});

function addToCart(nama, harga) {
  cart.push({ nama, harga });
  total += harga;
  renderCart();
}

function renderCart() {
  const cartList = document.getElementById('cartList');
  cartList.innerHTML = '';

  cart.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<span>${item.nama}</span><span>Rp ${item.harga}</span>`;
    cartList.appendChild(div);
  });

  document.getElementById('total').innerText = total;
}

// ONLINE / OFFLINE DETECTION
function updateStatus() {
  const status = document.getElementById('status');

  if (navigator.onLine) {
    status.innerText = "🟢 Anda sedang ONLINE";
    status.className = "status online";
  } else {
    status.innerText = "🔴 Anda sedang OFFLINE";
    status.className = "status offline";
  }
}

window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);

updateStatus();

// REGISTER SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
