<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#4CAF50;
    color:white;
    padding:15px;
    text-align:center;
    position:relative;
}

nav{
    display:flex;
    justify-content:center;
    background:white;
}

nav button{
    padding:12px;
    border:none;
    background:none;
    cursor:pointer;
    font-weight:bold;
}

.page{
    display:none;
    padding:20px;
    max-width:600px;
    margin:auto;
}

.active{
    display:block;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.primary{
    background:#4CAF50;
    color:white;
}

.danger{
    background:red;
    color:white;
}

.status{
    text-align:center;
    padding:6px;
    font-size:12px;
}

.logout-btn{
    position:absolute;
    right:15px;
    top:15px;
    background:red;
    color:white;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<section id="loginPage">
    <div class="card" style="max-width:350px; margin:80px auto;">
        <h2 style="text-align:center;color:#4CAF50;">Login Kasir</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="primary" style="width:100%;" onclick="login()">Masuk</button>
    </div>
</section>

<!-- APP PAGE -->
<div id="appPage" style="display:none;">

<header>
    <h2>Kasir PWA Offline Online</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div id="status" class="status">Checking...</div>

<nav>
    <button onclick="nav('kasir')">Kasir</button>
    <button onclick="nav('riwayat')">Riwayat</button>
</nav>

<!-- KASIR -->
<section id="kasir" class="page active">
    <div class="card">
        <input id="nama" placeholder="Nama Barang">
        <input id="harga" type="number" placeholder="Harga">
        <input id="qty" type="number" placeholder="Qty">
        <button class="primary" onclick="tambah()">Tambah</button>
    </div>

    <div class="card">
        <h3>Total: Rp <span id="total">0</span></h3>
        <button class="primary" onclick="sync()">Sync Data</button>
    </div>
</section>

<!-- RIWAYAT -->
<section id="riwayat" class="page">
    <div id="list"></div>
</section>

</div>

<script>
const DB = 'kasir_db';
const USER = "admin";
const PASS = "12345";

// CHECK LOGIN
checkLogin();

function checkLogin(){
    if(localStorage.getItem("login") === "true"){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";
    }else{
        document.getElementById("loginPage").style.display = "block";
        document.getElementById("appPage").style.display = "none";
    }
}

// LOGIN
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === USER && pass === PASS){
        localStorage.setItem("login", "true");
        alert("Login berhasil!");
        checkLogin();
    }else{
        alert("Username / Password salah!");
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("login");
    checkLogin();
}

// NAVIGATION
function nav(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if(id === 'riwayat') tampil();
}

// CREATE
function tambah(){
    let nama = document.getElementById('nama').value;
    let harga = parseInt(document.getElementById('harga').value);
    let qty = parseInt(document.getElementById('qty').value);

    if(!nama || !harga || !qty){
        alert('Isi semua!');
        return;
    }

    let total = harga * qty;

    let data = JSON.parse(localStorage.getItem(DB)) || [];
    data.unshift({
        id: Date.now(),
        nama,
        harga,
        qty,
        total
    });

    localStorage.setItem(DB, JSON.stringify(data));
    document.getElementById('total').innerText = total;

    document.getElementById('nama').value='';
    document.getElementById('harga').value='';
    document.getElementById('qty').value='';

    alert('Berhasil disimpan!');
}

// READ
function tampil(){
    let data = JSON.parse(localStorage.getItem(DB)) || [];
    let list = document.getElementById('list');

    if(data.length === 0){
        list.innerHTML = '<p>Tidak ada data</p>';
        return;
    }

    list.innerHTML = data.map((d,i)=>`
        <div class="card">
            <b>${d.nama}</b><br>
            Harga: Rp ${d.harga}<br>
            Qty: ${d.qty}<br>
            Total: Rp ${d.total}<br><br>
            <button class="danger" onclick="hapus(${i})">Hapus</button>
        </div>
    `).join('');
}

// DELETE
function hapus(i){
    let data = JSON.parse(localStorage.getItem(DB)) || [];
    data.splice(i,1);
    localStorage.setItem(DB, JSON.stringify(data));
    tampil();
}

// ONLINE OFFLINE STATUS
function status(){
    let el = document.getElementById('status');

    if(navigator.onLine){
        el.innerText = "ONLINE";
        el.style.background = "green";
        el.style.color = "white";
    }else{
        el.innerText = "OFFLINE";
        el.style.background = "red";
        el.style.color = "white";
    }
}

window.addEventListener('online', ()=>{
    status();
    sync();
});

window.addEventListener('offline', status);
status();

// SYNC
async function sync(){
    if(!navigator.onLine){
        alert('Offline!');
        return;
    }

    alert('Sync sukses!');
}

// SERVICE WORKER
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
