<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">

    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #4a90e2; color: white; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; background: white; }
        nav a { padding: 1rem; cursor: pointer; }

        .page { display: none; padding: 20px; max-width: 600px; margin: auto; }
        .active { display: block; }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            background: #4a90e2;
            color: white;
            border: none;
            cursor: pointer;
        }

        .danger { background: red; }
    </style>
</head>

<body>

<header>
    <h1>Kasir Sederhana</h1>
</header>

<nav>
    <a onclick="navigateTo('kasir')">Kasir</a>
    <a onclick="navigateTo('riwayat')">Riwayat</a>
</nav>

<!-- HALAMAN KASIR -->
<section id="kasir" class="page active">
    <h2>Input Transaksi</h2>

    <div class="card">
        <input type="text" id="nama" placeholder="Nama Barang">
        <input type="number" id="harga" placeholder="Harga">
        <input type="number" id="qty" placeholder="Jumlah">

        <button onclick="tambahTransaksi()">Simpan</button>
    </div>

    <div class="card">
        <h3>Total: Rp <span id="total">0</span></h3>
    </div>
</section>

<!-- HALAMAN RIWAYAT -->
<section id="riwayat" class="page">
    <h2>Riwayat Transaksi</h2>
    <div id="list"></div>
</section>

<script>
const DB = 'kasir_db';

// SPA NAVIGATION
function navigateTo(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');

    if (page === 'riwayat') tampilkan();
}

// TAMBAH TRANSAKSI (CREATE)
function tambahTransaksi() {
    const nama = document.getElementById('nama').value;
    const harga = parseInt(document.getElementById('harga').value);
    const qty = parseInt(document.getElementById('qty').value);

    if (!nama || !harga || !qty) {
        alert('Isi semua data!');
        return;
    }

    const total = harga * qty;

    const data = JSON.parse(localStorage.getItem(DB)) || [];

    data.push({ nama, harga, qty, total });

    localStorage.setItem(DB, JSON.stringify(data));

    document.getElementById('total').innerText = total;

    alert('Transaksi berhasil!');
}

// READ
function tampilkan() {
    const data = JSON.parse(localStorage.getItem(DB)) || [];

    const list = document.getElementById('list');

    if (data.length === 0) {
        list.innerHTML = '<p>Tidak ada transaksi</p>';
        return;
    }

    list.innerHTML = data.map((item, i) => `
        <div class="card">
            <b>${item.nama}</b><br>
            Harga: ${item.harga}<br>
            Qty: ${item.qty}<br>
            Total: ${item.total}<br>
            <button onclick="hapus(${i})" class="danger">Hapus</button>
        </div>
    `).join('');
}

// DELETE
function hapus(index) {
    const data = JSON.parse(localStorage.getItem(DB));

    data.splice(index, 1);

    localStorage.setItem(DB, JSON.stringify(data));

    tampilkan();
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
