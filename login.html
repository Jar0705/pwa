<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Kasir PWA</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:25px;
    width:320px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#4CAF50;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.error{
    color:red;
    font-size:14px;
    text-align:center;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
    <h2>Login Kasir</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Masuk</button>

    <div id="error" class="error"></div>
</div>

<script>
// user default
const USER = "admin";
const PASS = "12345";

// kalau sudah login langsung masuk index
if(localStorage.getItem("login") === "true"){
    window.location.href = "index.html";
}

function login(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let error = document.getElementById("error");

    if(username === USER && password === PASS){
        localStorage.setItem("login", "true");
        localStorage.setItem("user", username);

        alert("Login berhasil!");
        window.location.href = "index.html";
    }else{
        error.innerText = "Username atau password salah!";
    }
}
</script>

</body>
</html>
